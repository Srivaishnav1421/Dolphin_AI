apiVersion: v1
kind: Secret
metadata:
  name: dolphin-secrets
type: Opaque
stringData:
  SPRING_DATASOURCE_PASSWORD: replace-with-strong-postgres-password
  SPRING_RABBITMQ_PASSWORD: replace-with-strong-rabbitmq-password
  JWT_SECRET: replace-with-64-plus-random-characters
  META_ENCRYPTION_KEY: replace-with-32-plus-random-characters
  META_APP_ID: replace-with-meta-app-id
  META_APP_SECRET: replace-with-meta-app-secret
  META_WEBHOOK_VERIFY_TOKEN: replace-with-webhook-token
  GEMINI_API_KEY: replace-with-gemini-key
  OPENAI_API_KEY: replace-with-openai-key-if-used
  RAZORPAY_KEY_ID: replace-with-razorpay-key-id
  RAZORPAY_KEY_SECRET: replace-with-razorpay-key-secret
  RAZORPAY_WEBHOOK_SECRET: replace-with-razorpay-webhook-secret
  MAIL_USER: replace-with-smtp-user
  MAIL_PASS: replace-with-smtp-password
  ALERT_EMAIL: security@example.com
  MINIO_ROOT_USER: dolphin
  MINIO_ROOT_PASSWORD: replace-with-strong-minio-password
