# ── DEV Profile: PostgreSQL mandatory ─────────────────────────────
dolphin.local-mode.enabled=${DOLPHIN_LOCAL_MODE_ENABLED:true}
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.hikari.initialization-fail-timeout=5000
spring.datasource.hikari.connection-timeout=5000
spring.h2.console.enabled=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.flyway.baseline-on-migrate=true

# Dev-only Secrets Fallback (Strictly for local development only)
jwt.secret=DolphinAI_SuperSecretKey_2026_HS256_MinLength32BytesRequired!!
meta.encryption.key=DolphinAIEncryptionKeySecret32Chars!

# ── Legacy Ollama Service (com.chubby.dolphin.service.OllamaService) ──────────
# These use the non-prefixed ollama.* keys (legacy service, pre-AI-layer)
ollama.base-url=http://localhost:11434
ollama.model=llama3
ollama.enabled=true
ollama.timeout-seconds=30

# ── Gemini AI Configuration (optional — disabled by default) ─────────────────
gemini.api.url=https://generativelanguage.googleapis.com
gemini.api.key=

# ── Mock AI Config ────────────────────────────────────────────────
ai.mock.enabled=true
