# ══════════════════════════════════════════════════════════════════
#  DolphinAI — application.properties
#  ALL SECRETS USE ENVIRONMENT VARIABLES — NEVER COMMIT REAL KEYS
# ══════════════════════════════════════════════════════════════════

server.port=8000
server.error.include-message=always
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4200}

# ── Local Env Import ───────────────────────────────────────────────
# Allows `mvn spring-boot:run` from /backend to read ../.env automatically.
# Real deployments should still use platform environment variables/secrets.
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

# ── Active Profile ────────────────────────────────────────────────
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
dolphin.local-mode.enabled=${DOLPHIN_LOCAL_MODE_ENABLED:true}

# ── PostgreSQL Database ──────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.hikari.initialization-fail-timeout=5000
spring.datasource.hikari.connection-timeout=5000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# ── HuggingFace AI Configuration ────────────────────────────────────
ai.huggingface.enabled=true
ai.huggingface.api-key=${HF_TOKEN:}
ai.huggingface.model=meta-llama/Llama-3.1-8B-Instruct
ai.huggingface.base-url=https://api-inference.huggingface.co/models

# ── Ollama AI Configuration ─────────────────────────────────────────
ai.ollama.enabled=true
ai.ollama.base-url=http://localhost:11434
ai.ollama.model=llama3

# ── LLM Router Configuration ─────────────────────────────────────────
llm.router.temperature=0.3
llm.router.max-tokens=1024
ai.mock.enabled=true

# ── Feature Model Mappings ───────────────────────────────────────────
ai.feature-models.creative=mistralai/Mistral-7B-Instruct-v0.3
ai.feature-models.sdr=meta-llama/Llama-3.1-8B-Instruct
ai.feature-models.campaign-analysis=Qwen/Qwen3-8B-Instruct
ai.feature-models.brain-decision=Qwen/Qwen3-14B-Instruct
ai.feature-models.general-assistant=google/gemma-3-12b-it

# ── Meta Marketing API ───────────────────────────────────────────
meta.app.id=${META_APP_ID:}
meta.app.secret=${META_APP_SECRET:}
meta.api.version=v21.0
meta.api.base-url=https://graph.facebook.com
meta.redirect-uri=${META_REDIRECT_URI:http://localhost:4200/meta/callback}
meta.webhook.verify-token=${META_WEBHOOK_VERIFY_TOKEN:chubby_dolphin_verify_2024}

# ── Brain Engine Configuration ────────────────────────────────────
brain.cycle.interval-ms=900000
brain.auto-pause.roas-threshold=2.0
brain.auto-execute.min-confidence=0.85
brain.approval-required.min-confidence=0.50
brain.max-budget-change-percent=30
brain.max-campaigns-per-day=20
brain.emergency-pause.min-balance=500

# ── Ad Brain Manual Run Configuration ────────────────────────────
dolphin.adbrain.scheduler.enabled=false
dolphin.adbrain.scheduler.interval-minutes=15

# ── Safety Rules ──────────────────────────────────────────────────
safety.max-daily-spend=${SAFETY_MAX_DAILY_SPEND:50000}
safety.max-single-budget-change-percent=30
safety.protected-campaign-override=false

# ── JWT ───────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:ChubbyDolphinAI_SuperSecretKey_2024_HS256_MinLength32BytesRequired!!}
jwt.expiration=900000

# ── CORS ──────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# ── Razorpay Payment Gateway ─────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:}
razorpay.currency=INR
app.billing.manual-wallet-funding-enabled=${MANUAL_WALLET_FUNDING_ENABLED:false}

# ── Email Alerts (Gmail SMTP) ─────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false
alerts.enabled=${ALERTS_ENABLED:false}

# ── First-run Owner Bootstrap ─────────────────────────────────────
# Optional one-time bootstrap for a real owner account. Do not use DEMO_* for production owner setup.
first-run.owner.email=${FIRST_RUN_OWNER_EMAIL:}
first-run.owner.password=${FIRST_RUN_OWNER_PASSWORD:}
first-run.owner.name=${FIRST_RUN_OWNER_NAME:Owner}
first-run.organization.name=${FIRST_RUN_ORGANIZATION_NAME:DolphinAI Organization}
first-run.workspace.name=${FIRST_RUN_WORKSPACE_NAME:Default Workspace}

# ── Dev/Demo Team Seed Credentials ────────────────────────────────
demo.email=${DEMO_EMAIL:}
demo.password=${DEMO_PASSWORD:}
app.seed.demo-users-enabled=${DEMO_USERS_ENABLED:false}

# ── Swagger ───────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
app.security.public-docs-enabled=${PUBLIC_DOCS_ENABLED:true}
app.security.hsts-enabled=${HSTS_ENABLED:false}
app.security.edge-rate-limit-enabled=${EDGE_RATE_LIMIT_ENABLED:true}
app.security.content-security-policy=${CONTENT_SECURITY_POLICY:default-src 'self'; script-src 'self' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' http://localhost:* ws://localhost:* https: wss:; frame-src https://api.razorpay.com https://checkout.razorpay.com; object-src 'none'; base-uri 'self'}

# ── Actuator ──────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.mail.enabled=false
info.app.name=DolphinAI
info.app.version=2.0.0

# ── Performance ───────────────────────────────────────────────────
spring.jpa.open-in-view=false

# ── Logging ───────────────────────────────────────────────────────
logging.level.com.chubby.dolphin=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── Redis Cache ────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.repositories.enabled=false
spring.cache.type=simple
spring.cache.redis.time-to-live=60000

# ── Alerts Configuration ───────────────────────────────────────────
alerts.email=${ALERT_EMAIL:admin@dolphin.ai}
alerts.roas.threshold=1.5
alerts.hot.lead.notify=true

# ── Scheduling ─────────────────────────────────────────────────────
spring.task.scheduling.pool.size=4

# ── Encryption Configuration ────────────────────────────────────────
meta.encryption.key=${META_ENCRYPTION_KEY:DolphinAIEncryptionKeySecret32Chars!}
meta.encryption.old-key=${META_ENCRYPTION_OLD_KEY:DolphinAIOldKeySecret32CharsBackup!}

# ── Resilience4j Circuit Breaker Config ──────────────────────────────
resilience4j.circuitbreaker.instances.metaGraphApi.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.metaGraphApi.slidingWindowSize=10
resilience4j.circuitbreaker.instances.metaGraphApi.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.metaGraphApi.failureRateThreshold=50.0
resilience4j.circuitbreaker.instances.metaGraphApi.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.metaGraphApi.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.metaGraphApi.automaticTransitionFromOpenToHalfOpenEnabled=true

resilience4j.retry.instances.metaGraphApi.maxAttempts=3
resilience4j.retry.instances.metaGraphApi.waitDuration=2s

# ── n8n Integration ───────────────────────────────────────────────
n8n.webhook-url=${N8N_WEBHOOK_URL:http://localhost:5678/webhook/execute}

# ── File Storage (DA-052) ─────────────────────────────────────────
storage.local.base-dir=${STORAGE_BASE_DIR:storage}

# ── Corporate GST / Billing Config ───────────────────────────────
chubby.corp.state-code=${CORP_STATE_CODE:MH}
chubby.corp.legal-name=${CORP_LEGAL_NAME:DolphinAI Private Limited}
chubby.corp.gstin=${CORP_GSTIN:27AAACC4111D1Z5}
chubby.corp.address=${CORP_ADDRESS:102 Alpha Towers, Bandra Kurla Complex, Mumbai, MH - 400051}
chubby.corp.sac-code=997331
