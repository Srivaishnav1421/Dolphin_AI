# ══════════════════════════════════════════════════════════════════
#  DolphinAI — application.properties
#  ALL SECRETS USE ENVIRONMENT VARIABLES — NEVER COMMIT REAL KEYS
# ══════════════════════════════════════════════════════════════════

server.port=8000
server.error.include-message=always

# ── Active Profile ────────────────────────────────────────────────
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── H2 Dev Database (default when profile=dev) ───────────────────
spring.datasource.url=jdbc:h2:mem:chubbydb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# ── HuggingFace AI Configuration ────────────────────────────────────
ai.huggingface.enabled=true
ai.huggingface.api-key=${HF_TOKEN:}
ai.huggingface.model=meta-llama/Llama-3.1-8B-Instruct
ai.huggingface.base-url=https://api-inference.huggingface.co/models

# ── Ollama AI Configuration ─────────────────────────────────────────
ai.ollama.enabled=true
ai.ollama.base-url=http://localhost:11434
ai.ollama.model=llama3

# ── LLM Router Configuration ─────────────────────────────────────────
llm.router.temperature=0.3
llm.router.max-tokens=1024
ai.mock.enabled=true

# ── Feature Model Mappings ───────────────────────────────────────────
ai.feature-models.creative=mistralai/Mistral-7B-Instruct-v0.3
ai.feature-models.sdr=meta-llama/Llama-3.1-8B-Instruct
ai.feature-models.campaign-analysis=Qwen/Qwen3-8B-Instruct
ai.feature-models.brain-decision=Qwen/Qwen3-14B-Instruct
ai.feature-models.general-assistant=google/gemma-3-12b-it

# ── Meta Marketing API ───────────────────────────────────────────
meta.app.id=${META_APP_ID:}
meta.app.secret=${META_APP_SECRET:}
meta.api.version=v21.0
meta.api.base-url=https://graph.facebook.com
meta.redirect-uri=${META_REDIRECT_URI:http://localhost:4200/meta/callback}
meta.webhook.verify-token=${META_WEBHOOK_VERIFY_TOKEN:chubby_dolphin_verify_2024}

# ── Brain Engine Configuration ────────────────────────────────────
brain.cycle.interval-ms=900000
brain.auto-pause.roas-threshold=2.0
brain.auto-execute.min-confidence=0.85
brain.approval-required.min-confidence=0.50
brain.max-budget-change-percent=30
brain.max-campaigns-per-day=20
brain.emergency-pause.min-balance=500

# ── Safety Rules ──────────────────────────────────────────────────
safety.max-daily-spend=${SAFETY_MAX_DAILY_SPEND:50000}
safety.max-single-budget-change-percent=30
safety.protected-campaign-override=false

# ── JWT ───────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:ChubbyDolphinAI_SuperSecretKey_2024_HS256_MinLength32BytesRequired!!}
jwt.expiration=900000

# ── CORS ──────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# ── Razorpay Payment Gateway ─────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
razorpay.currency=INR

# ── Email Alerts (Gmail SMTP) ─────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false
alerts.enabled=${ALERTS_ENABLED:false}

# ── Demo Admin Credentials ────────────────────────────────────────
demo.email=${DEMO_EMAIL:admin@dolphin.ai}
demo.password=${DEMO_PASSWORD:dolphin123}

# ── Swagger ───────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Actuator ──────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.mail.enabled=false
info.app.name=DolphinAI
info.app.version=2.0.0

# ── Performance ───────────────────────────────────────────────────
spring.jpa.open-in-view=false

# ── Logging ───────────────────────────────────────────────────────
logging.level.com.chubby.dolphin=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── Redis Cache ────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.cache.type=simple
spring.cache.redis.time-to-live=60000

# ── Alerts Configuration ───────────────────────────────────────────
alerts.email=${ALERT_EMAIL:admin@dolphin.ai}
alerts.roas.threshold=1.5
alerts.hot.lead.notify=true

# ── Scheduling ─────────────────────────────────────────────────────
spring.task.scheduling.pool.size=4

# ── Encryption Configuration ────────────────────────────────────────
meta.encryption.key=${META_ENCRYPTION_KEY:DolphinAIEncryptionKeySecret32Chars!}
meta.encryption.old-key=${META_ENCRYPTION_OLD_KEY:DolphinAIOldKeySecret32CharsBackup!}

# ── Resilience4j Circuit Breaker Config ──────────────────────────────
resilience4j.circuitbreaker.instances.metaGraphApi.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.metaGraphApi.slidingWindowSize=10
resilience4j.circuitbreaker.instances.metaGraphApi.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.metaGraphApi.failureRateThreshold=50.0
resilience4j.circuitbreaker.instances.metaGraphApi.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.metaGraphApi.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.metaGraphApi.automaticTransitionFromOpenToHalfOpenEnabled=true

resilience4j.retry.instances.metaGraphApi.maxAttempts=3
resilience4j.retry.instances.metaGraphApi.waitDuration=2s

# ── n8n Integration ───────────────────────────────────────────────
n8n.webhook-url=${N8N_WEBHOOK_URL:http://localhost:5678/webhook/execute}

