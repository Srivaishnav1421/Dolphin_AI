# ── PROD Profile: PostgreSQL ───────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:}
dolphin.local-mode.enabled=${DOLPHIN_LOCAL_MODE_ENABLED:false}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.h2.console.enabled=false
server.error.include-message=never
server.error.include-stacktrace=never
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.threads.virtual.enabled=true
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain,text/css,application/javascript,image/svg+xml
server.compression.min-response-size=1024
server.tomcat.accept-count=100
server.tomcat.threads.max=240
server.tomcat.threads.min-spare=20
server.tomcat.connection-timeout=10s
server.tomcat.max-http-form-post-size=2MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# ── Hikari Connection Pooling ──────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000

# ── Actuator & Metrics ─────────────────────────────────────────────
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info,prometheus
management.health.db.enabled=true

# ── Flyway Migrations ──────────────────────────────────────────────
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ── Redis (production) ─────────────────────────────────────────────
spring.cache.type=redis
spring.data.redis.timeout=1500ms

# ── Mock AI Config ────────────────────────────────────────────────
ai.mock.enabled=false
app.seed.demo-users-enabled=false

# ── First-run Owner Bootstrap (optional, real owner only) ─────────
first-run.owner.email=${FIRST_RUN_OWNER_EMAIL:}
first-run.owner.password=${FIRST_RUN_OWNER_PASSWORD:}
first-run.owner.name=${FIRST_RUN_OWNER_NAME:Owner}
first-run.organization.name=${FIRST_RUN_ORGANIZATION_NAME:DolphinAI Organization}
first-run.workspace.name=${FIRST_RUN_WORKSPACE_NAME:Default Workspace}

# ── Production Surface Hardening ─────────────────────────────────
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
app.security.public-docs-enabled=false
app.security.hsts-enabled=true
app.security.content-security-policy=default-src 'self'; script-src 'self' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-src https://api.razorpay.com https://checkout.razorpay.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'
