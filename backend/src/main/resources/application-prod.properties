# ── PROD Profile: PostgreSQL ───────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dolphindb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dolphin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dolphin123}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# ── Hikari Connection Pooling ──────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# ── Actuator & Metrics ─────────────────────────────────────────────
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics
management.health.db.enabled=true

# ── Flyway Migrations ──────────────────────────────────────────────
spring.flyway.baseline-on-migrate=true

# ── Redis (production) ─────────────────────────────────────────────
spring.cache.type=redis

# ── Mock AI Config ────────────────────────────────────────────────
ai.mock.enabled=false
