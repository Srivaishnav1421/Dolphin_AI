<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar" [class.sidebar--collapsed]="!state.isSidebarExpanded()">
    <div class="sidebar__logo">
      <div class="sidebar__logo-icon" (click)="toggleSidebar()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </div>
      <div class="sidebar__logo-text" *ngIf="state.isSidebarExpanded()">
        <span class="sidebar__logo-name">DolphinAI</span>
        <span class="sidebar__logo-tag">Operating System</span>
      </div>
    </div>

    <!-- Flat Navigation -->
    <nav class="sidebar__nav">
      <div class="sidebar__section-items">
        <a *ngFor="let item of navItems"
           class="sidebar__link"
           [routerLink]="item.path"
           routerLinkActive="sidebar__link--active"
           [title]="item.label">
          <span class="material-symbols-outlined sidebar__link-icon">{{ item.icon }}</span>
          <span class="sidebar__link-label" *ngIf="state.isSidebarExpanded()">{{ item.label }}</span>
        </a>
      </div>
    </nav>

    <!-- Sidebar footer profile & theme toggler -->
    <!-- Sidebar footer profile & theme toggler -->
    <div class="sidebar__footer">
      <div class="sidebar__theme-toggle" *ngIf="state.isSidebarExpanded()">
        <button class="theme-btn" [class.theme-btn--active]="state.theme() === 'light'" (click)="state.setTheme('light')" title="Light Mode">
          <span class="material-symbols-outlined font-icon">light_mode</span>
        </button>
        <button class="theme-btn" [class.theme-btn--active]="state.theme() === 'dark'" (click)="state.setTheme('dark')" title="Dark Mode">
          <span class="material-symbols-outlined font-icon">dark_mode</span>
        </button>
        <button class="theme-btn" [class.theme-btn--active]="state.theme() === 'system'" (click)="state.setTheme('system')" title="System Theme">
          <span class="material-symbols-outlined font-icon">desktop_windows</span>
        </button>
      </div>

      <div class="sidebar__footer-bottom">
        <div class="sidebar__user" *ngIf="state.isSidebarExpanded()">
          <div class="sidebar__avatar">
            {{ auth.currentUser()?.name?.charAt(0) ?? 'U' }}
          </div>
          <div class="sidebar__user-info">
            <span class="sidebar__user-name">{{ auth.currentUser()?.name ?? 'User' }}</span>
            <span class="sidebar__user-role">{{ auth.currentUser()?.role ?? 'Admin' }}</span>
          </div>
        </div>
        
        <div class="sidebar__actions" [class.sidebar__actions--vertical]="!state.isSidebarExpanded()">
          <button class="sidebar__action-btn" title="Change Password" (click)="openPwdModal()">
            <span class="material-symbols-outlined font-icon">vpn_key</span>
          </button>
          <button class="sidebar__action-btn sidebar__action-btn--logout" title="Logout" (click)="logout()">
            <span class="material-symbols-outlined font-icon">logout</span>
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content Container -->
  <main class="shell__content">
    <router-outlet />
  </main>

</div>

<!-- Password Change Modal using UiModal component -->
<ui-modal [show]="showPwdModal()" title="🔑 Change Password" (closed)="closePwdModal()">
  <div class="form-group">
    <label class="ui-label">Current Password</label>
    <input class="input" type="password" [(ngModel)]="pwd.old" placeholder="••••••••" />
  </div>
  <div class="form-group">
    <label class="ui-label">New Password</label>
    <input class="input" type="password" [(ngModel)]="pwd.new_pwd" placeholder="Min 6 characters" />
  </div>
  <div class="form-group">
    <label class="ui-label">Confirm New Password</label>
    <input class="input" type="password" [(ngModel)]="pwd.confirm" placeholder="Repeat new password" />
  </div>
  <div *ngIf="pwdMsg()" class="form-msg"
       [style.color]="pwdMsg().startsWith('✅') ? 'var(--success)' : 'var(--warning)'">
    {{ pwdMsg() }}
  </div>
  <div class="modal-footer-actions">
    <button class="btn btn-ghost" (click)="closePwdModal()">Cancel</button>
    <button class="btn btn-primary" (click)="changePassword()" [disabled]="pwdSaving()">
      <span *ngIf="pwdSaving()">Saving…</span>
      <span *ngIf="!pwdSaving()">🔑 Update Password</span>
    </button>
  </div>
</ui-modal>

<!-- Global Command Palette overlay (triggered via Ctrl + K) -->
<ui-command-palette></ui-command-palette>
