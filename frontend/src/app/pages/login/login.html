<div class="login-bg">
  <!-- Ambient blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="login-card animate-slide-up">
    <!-- Logo -->
    <div class="login-logo">
      <span class="login-logo__icon">🐬</span>
      <div>
        <h1 class="login-logo__name">DolphinAI</h1>
        <p class="login-logo__sub">Meta Ads Intelligence Platform</p>
      </div>
    </div>

    <h2 class="login-title">Welcome back</h2>
    <p class="login-subtitle">Sign in to your dashboard</p>

    <!-- Error -->
    @if (error()) {
      <div class="login-error animate-fade-in">⚠️ {{ error() }}</div>
    }

    <!-- Form -->
    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email address</label>
        <input class="input" type="email" placeholder="you@agency.com" [(ngModel)]="email" name="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="input" type="password" placeholder="••••••••" [(ngModel)]="password" name="password" />
      </div>

      <button class="btn btn-primary login-btn" type="submit" [disabled]="loading()">
        @if (loading()) { <span class="spinner"></span> Signing in… }
        @else { 🔐 Sign In }
      </button>
    </form>

    <p class="login-footer">DolphinAI v1.0 — Brain Module</p>
  </div>
</div>
